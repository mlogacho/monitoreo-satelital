<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoreo Starlink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --active-color: #10b981;
            --active-bg: rgba(16, 185, 129, 0.15);
            --inactive-color: #ef4444;
            --inactive-bg: rgba(239, 68, 68, 0.15);
            --accent: #3b82f6;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        h1 svg {
            width: 32px;
            height: 32px;
            color: var(--accent);
        }

        .meta-info {
            text-align: right;
            font-size: 14px;
            color: var(--text-muted);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 24px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .antena-name {
            font-size: 18px;
            font-weight: 600;
            margin: 0;
            line-height: 1.3;
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .status-badge::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: block;
        }

        .status-active {
            background-color: var(--active-bg);
            color: var(--active-color);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-active::before {
            background-color: var(--active-color);
            box-shadow: 0 0 8px var(--active-color);
        }

        .status-inactive {
            background-color: var(--inactive-bg);
            color: var(--inactive-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .status-inactive::before {
            background-color: var(--inactive-color);
            box-shadow: 0 0 8px var(--inactive-color);
        }

        .card-body {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .info-row svg {
            width: 16px;
            height: 16px;
            opacity: 0.7;
        }

        .location-value {
            color: var(--text-main);
            font-family: monospace;
            background: rgba(0,0,0,0.2);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 13px;
        }

        .stats-summary {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-active .stat-value { color: var(--active-color); }
        .stat-inactive .stat-value { color: var(--inactive-color); }

        .loader {
            display: flex;
            justify-content: center;
            padding: 40px;
            color: var(--text-muted);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .refreshing {
            animation: pulse 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 017.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12.53 18.22l-.53.53-.53-.53a.75.75 0 011.06 0z" />
            </svg>
            Monitoreo Satelital
        </h1>
        <div class="meta-info">
            <div id="last-updated">Última actualización: Cargando...</div>
            <div id="total-antennas">Total: 0 antenas</div>
        </div>
    </header>

    <div class="stats-summary" id="stats-container" style="display: none;">
        <div class="stat-box stat-active">
            <div class="stat-value" id="count-active">0</div>
            <div class="stat-label">Activas</div>
        </div>
        <div class="stat-box stat-inactive">
            <div class="stat-value" id="count-inactive">0</div>
            <div class="stat-label">Inactivas</div>
        </div>
    </div>

    <div id="loader" class="loader">
        Cargando datos de antenas...
    </div>

    <div class="grid" id="antennas-grid">
        <!-- Tarjetas de antenas generadas por JS -->
    </div>
</div>

<script>
    async function loadData() {
        try {
            const response = await fetch('/api/data');
            const result = await response.json();
            
            document.getElementById('loader').style.display = 'none';
            
            if (result.error && !result.data.length) {
                document.getElementById('antennas-grid').innerHTML = `
                    <div style="grid-column: 1/-1; text-align: center; color: var(--inactive-color); padding: 40px; background: var(--card-bg); border-radius: 16px;">
                        Error al cargar los datos: ${result.error}.<br>
                        Asegúrate de haber corrido el script monitor_starlink.py
                    </div>`;
                return;
            }

            const data = result.data;
            const timestamp = new Date(result.timestamp);
            
            document.getElementById('last-updated').textContent = `Última actualización: ${timestamp.toLocaleString()}`;
            document.getElementById('total-antennas').textContent = `Total: ${data.length} antenas`;

            const grid = document.getElementById('antennas-grid');
            grid.innerHTML = '';

            let activeCount = 0;
            let inactiveCount = 0;

            data.forEach(antena => {
                const isActive = antena.estado.toLowerCase().includes('activo');
                
                if (isActive) activeCount++;
                else inactiveCount++;

                const statusClass = isActive ? 'status-active' : 'status-inactive';
                const statusText = isActive ? 'Activo' : (antena.estado || 'Inactivo');

                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-header">
                        <h2 class="antena-name">${antena.nombre}</h2>
                        <span class="status-badge ${statusClass}">${statusText}</span>
                    </div>
                    <div class="card-body">
                        <div class="info-row">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z" />
                              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z" />
                            </svg>
                            Ubicación GPS: 
                            <span class="location-value">${antena.ubicacion}</span>
                        </div>
                        <div class="info-row">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                              <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            Estado Reportado: ${antena.estado}
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('count-active').textContent = activeCount;
            document.getElementById('count-inactive').textContent = inactiveCount;
            document.getElementById('stats-container').style.display = 'flex';

        } catch (error) {
            console.error('Error fetching data:', error);
            document.getElementById('loader').textContent = 'Error de conexión. Reintentando en 10 segundos...';
        }
    }

    // Cargar inicial y configurar auto-refresco cada 30 segundos
    loadData();
    setInterval(loadData, 30000);
</script>

</body>
</html>
